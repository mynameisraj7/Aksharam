<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aksharam | Events</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="events">
    <header class="top-nav-wrap">
      <nav class="top-nav">
        <div class="top-nav-row">
          <a href="index.html" class="brand" aria-label="Aksharam home">
            <span class="brand-main">अक्षरम</span>
            <span class="brand-sub">साहित्य, संवाद और संस्कृति उत्सव</span>
          </a>
          <button id="navToggle" class="nav-toggle" type="button">Menu</button>
          <ul id="navLinks" class="nav-links"></ul>
        </div>
      </nav>
    </header>

    <main class="container">
      <section class="section">
        <h1 class="section-title reveal">All Events</h1>
        <div class="toolbar reveal">
          <input id="eventSearch" class="search-box" type="search" placeholder="Search events..." />
        </div>
        <div id="eventFilters" class="toolbar reveal"></div>
        <div id="allEventsGrid" class="event-grid"></div>
      </section>
    </main>

    <div class="farm-strip reveal">
      <img src="assets/farm_strip.png" alt="" aria-hidden="true" />
    </div>

    <footer id="siteFooter"></footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
